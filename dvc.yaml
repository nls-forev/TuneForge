stages:
  data_ingestion:
    cmd: python -m src.pipeline.run_stage ingest
    deps:
      - config/experiment.yaml
      - src/components/data_ingestion.py
      - src/entity/experiment_config.py
      - src/constants/__init__.py
      - src/pipeline/run_stage.py
      - uv.lock

    outs:
      - artifact/data_ingestion/raw
      - artifact/data_ingestion/data_ingested

  data_transformation:
    cmd: python -m src.pipeline.run_stage transform
    deps:
      - config/experiment.yaml
      - src/components/data_transformation.py
      - src/utils/text_utils.py
      - src/constants/__init__.py
      - src/pipeline/run_stage.py
      - uv.lock
      - artifact/data_ingestion/data_ingested

    outs:
      - artifact/data_transformation/transformed

  model_train:
    cmd: python -m src.pipeline.run_stage train
    deps:
      - config/hyperparams.yaml
      - config/experiment.yaml
      - src/components/model_trainer.py
      - src/entity/experiment_config.py
      - src/constants/__init__.py
      - src/pipeline/run_stage.py
      - uv.lock
      - artifact/data_transformation/transformed

    outs:
      - artifact/model_trainer/checkpoints
      - artifact/model_trainer/adapter

  # LLM-as-judge phase A (GPU): base + fine-tuned responses on the held-out
  # test split. Needs ~20GB+ VRAM (tested on A10G 24GB).
  model_generate:
    cmd: python -m src.pipeline.run_stage generate
    deps:
      - src/components/evaluation/generate_responses.py
      - config/experiment.yaml
      - src/entity/experiment_config.py
      - src/utils/text_utils.py
      - src/constants/__init__.py
      - src/pipeline/run_stage.py
      - uv.lock
      - artifact/model_trainer/adapter
      - artifact/data_ingestion/data_ingested

    outs:
      - artifact/model_evaluation/responses.parquet
      - artifact/model_evaluation/responses.experiment.json

  # LLM-as-judge phase B (CPU, DeepSeek API): grades responses.parquet.
  # Requires DEEPSEEK_API_KEY in the environment (or .env).
  model_evaluate:
    cmd: python -m src.pipeline.run_stage judge
    deps:
      - src/components/evaluation/judge.py
      - config/experiment.yaml
      - artifact/model_evaluation/responses.experiment.json
      - src/entity/experiment_config.py
      - src/constants/__init__.py
      - src/pipeline/run_stage.py
      - uv.lock
      - artifact/model_evaluation/responses.parquet

    metrics:
      - artifact/model_evaluation/metrics.json:
          cache: false
    outs:
      - artifact/model_evaluation/judge_scores.csv
      - artifact/model_evaluation/metrics.experiment.json
