lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "up_proj"
    - "gate_proj"
    - "down_proj"
  use_rslora: true

model:
  lr: 2e-4
  epochs: 2
  # effective batch = batch_size * grad_accum = 16
  # increased batch_size to 16 to utilize more VRAM (~16-17/23 GB on A10G).
  batch_size: 16
  grad_accum: 1
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler: "cosine"
  logging_steps: 10
  # eval/save every 1000 steps (was 500) to cut eval overhead over 2 epochs.
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
